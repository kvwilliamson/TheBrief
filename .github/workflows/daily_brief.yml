name: TheBrief Daily Pipeline
on:
  schedule:
    - cron: '0 6 * * *'  # Run every day at 6:00 AM UTC
  workflow_dispatch:     # Allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
          
      - name: Run pipeline
        run: |
          echo "Diagnostic: Checking secret visibility..."
          if [ -z "$YOUTUBE_API_KEY" ]; then 
            echo "ALERT: Key missing from 'secrets'. Checking 'vars' pool..."
            export YOUTUBE_API_KEY="${{ vars.YOUTUBE_API_KEY }}"
            export OPENAI_API_KEY="${{ vars.OPENAI_API_KEY }}"
            export GOOGLE_AI_API_KEY="${{ vars.GOOGLE_AI_API_KEY }}"
          fi
          
          if [ -z "$YOUTUBE_API_KEY" ]; then
            echo "FATAL: YOUTUBE_API_KEY could not be found in 'secrets' OR 'vars' pool."
            echo "Please ensure the name is EXACTLY 'YOUTUBE_API_KEY' in GitHub Settings."
            exit 1
          fi
          
          echo "Key found! Proceeding with pipeline..."
          python3 main.py
          
      - name: Commit artifacts (Data db and Briefs)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/processed_videos.json briefs/ data/pipeline.log
          if ! git diff --staged --quiet; then
            git commit -m "chore: Daily run updates [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
