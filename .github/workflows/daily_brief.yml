name: TheBrief Daily Pipeline
on:
  schedule:
    - cron: '0 6 * * *'  # Run every day at 6:00 AM UTC
  workflow_dispatch:     # Allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      bgutil:
        image: brainicism/bgutil-ytdlp-pot-provider:latest
        ports:
          - 4416:4416

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
          python3 -m pip install bgutil-ytdlp-pot-provider
          python3 -m pip install -U https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz
          which ffmpeg
          ffmpeg -version | head -n 1
          which yt-dlp
          yt-dlp --version

      - name: Wait for bgutil provider
        run: |
          echo "Waiting for bgutil POT provider to be ready..."
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:4416/ > /dev/null 2>&1; then
              echo "bgutil provider is ready!"
              break
            fi
            echo "Attempt $i/15 - waiting 2s..."
            sleep 2
          done

      - name: Setup YouTube Cookies
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Run pipeline
        run: python3 main.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}

      - name: Cleanup YouTube Cookies
        if: always()
        run: rm -f cookies.txt

      - name: Commit artifacts (Data db and Briefs)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/processed_videos.json briefs/ data/pipeline.log
          if ! git diff --staged --quiet; then
            git commit -m "chore: Daily run updates [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
